<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="scene">
        <div class="card" id="postcard">
            <div class="card-face card-front">
                <img src="front.jpg" alt="תמונה שלך" class="front-photo">
                <div class="hint-text">לחיצה קטנה לרגע שהוא רק בשבילך❤️</div>
            </div>

            <div class="card-face card-back">
                <div class="back-content-wrapper">
                    <div class="top-section">
                        <div class="postcard-title">
                            <h1>גלויה</h1>
                            <span>MY LOVE</span>
                        </div>
                        <div class="stamp-wrapper">
                            <div class="postmark">
                                <span>ירושלים</span>
                                <span class="postmark-date">24.05.2024</span>
                            </div>
                            <div class="stamp">
                                <img src="stamp.jpg" alt="תמונה שלנו" class="stamp-photo">
                            </div>
                        </div>
                    </div>
                    
                    <div class="divider-line"></div>

                    <div class="message-container">
                        <p id="typing-text"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="flipAudio" src="the small things you do.mp3" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
