name: Deploy to GitHub Pages

on:
  # רץ אוטומטית כשאתה מעדכן את הקוד
  push:
    branches: ["main"] 
  # מאפשר לך להריץ ידנית מהממשק
  workflow_dispatch:

# ההרשאות החסרות שבדרך כלל גורמות לשגיאה
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # מעלה את כל הקבצים שבתיקייה הראשית
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4